<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Smart Attendance{% endblock %} | CPV391</title>
    <meta name="description" content="Smart Classroom Face Recognition Attendance System">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
    <aside class="sidebar" id="sidebar">
        <div class="sidebar-brand">
            <div class="brand-icon">👁️</div>
            <span class="brand-text">CPV391</span>
        </div>
        <nav class="sidebar-nav">
            <a href="/" class="nav-item {% if active == 'dashboard' %}active{% endif %}" id="nav-dashboard">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg>
                <span>Dashboard</span>
            </a>
            <a href="/enrollment" class="nav-item {% if active == 'enrollment' %}active{% endif %}" id="nav-enrollment">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><line x1="19" y1="8" x2="19" y2="14"/><line x1="22" y1="11" x2="16" y2="11"/></svg>
                <span>Enrollment</span>
            </a>
            <a href="/attendance" class="nav-item {% if active == 'attendance' %}active{% endif %}" id="nav-attendance">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></svg>
                <span>Attendance</span>
            </a>
            <a href="/reports" class="nav-item {% if active == 'reports' %}active{% endif %}" id="nav-reports">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/></svg>
                <span>Reports</span>
            </a>
        </nav>
        <div class="sidebar-footer">
            <div class="sidebar-footer-text">Smart Classroom<br>Attendance System</div>
        </div>
    </aside>

    <main class="main-content">
        <header class="top-bar">
            <h1 class="page-title">{% block page_title %}Dashboard{% endblock %}</h1>
            <div class="top-bar-right">
                <span class="clock" id="clock"></span>
            </div>
        </header>
        <div class="content-body">
            {% block content %}{% endblock %}
        </div>
    </main>

    <script src="/static/app.js"></script>
    {% block scripts %}{% endblock %}
</body>
</html>
